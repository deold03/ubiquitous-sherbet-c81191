<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeletons for Netlify build-time detection. Never shown to users. -->

    <form name="home-lead" netlify netlify-honeypot="botField" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="propertyAddress" />
      <textarea name="message"></textarea>
    </form>

    <form name="contact-lead" netlify netlify-honeypot="botField" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="propertyAddress" />
      <textarea name="message"></textarea>
    </form>

    <form name="checklist" netlify netlify-honeypot="botField" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
    </form>

    <form name="newsletter" netlify hidden>
      <input type="email" name="email" />
    </form>
  </body>
</html>
